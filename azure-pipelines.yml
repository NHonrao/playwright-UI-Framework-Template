trigger:
  branches:
    include:
      - main
      - develop
      - feature/*

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  TEST_ENV: 'tst'
  NODE_VERSION: '20.x'

stages:
  - stage: Test
    displayName: 'Run Playwright E2E Tests'
    jobs:
      - job: PlaywrightTests
        displayName: 'Playwright Tests — $(TEST_ENV)'
        timeoutInMinutes: 90
        steps:
          # ── Checkout ───────────────────────────────────────────────────────────
          - checkout: self
            displayName: 'Checkout source code'

          # ── Node.js setup ──────────────────────────────────────────────────────
          - task: NodeTool@0
            displayName: 'Install Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          # ── Install npm dependencies ───────────────────────────────────────────
          - script: npm ci
            displayName: 'Install npm dependencies'

          # ── Install Playwright browsers ────────────────────────────────────────
          - script: npx playwright install --with-deps chromium firefox webkit
            displayName: 'Install Playwright browsers'

          # ── Write environment file from pipeline variables ─────────────────────
          # Store secrets in ADO pipeline library (variable groups), not in code
          - script: |
              cat > .env.tst <<EOF
              BASE_URL=$(BASE_URL)
              LOGIN_URL=$(LOGIN_URL)
              ADMIN_USERNAME=$(ADMIN_USERNAME)
              ADMIN_PASSWORD=$(ADMIN_PASSWORD)
              DB_SERVER=$(DB_SERVER)
              DB_NAME=$(DB_NAME)
              DB_USERNAME=$(DB_USERNAME)
              DB_PASSWORD=$(DB_PASSWORD)
              EOF
            displayName: 'Create TST environment file'
            condition: eq(variables['TEST_ENV'], 'tst')
            env:
              BASE_URL: $(BASE_URL)
              LOGIN_URL: $(LOGIN_URL)
              ADMIN_USERNAME: $(ADMIN_USERNAME)
              ADMIN_PASSWORD: $(ADMIN_PASSWORD)
              DB_SERVER: $(DB_SERVER)
              DB_NAME: $(DB_NAME)
              DB_USERNAME: $(DB_USERNAME)
              DB_PASSWORD: $(DB_PASSWORD)

          # ── Run Playwright tests ───────────────────────────────────────────────
          - script: npx playwright test --project=chromium
            displayName: 'Run tests — Chromium'
            env:
              TEST_ENV: $(TEST_ENV)
              CI: 'true'
            continueOnError: true

          # ── Publish JUnit results (ADO native test dashboard) ──────────────────
          - task: PublishTestResults@2
            displayName: 'Publish JUnit test results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/junit-results.xml'
              mergeTestResults: true
              testRunTitle: 'Playwright E2E — $(TEST_ENV) — $(Build.BuildNumber)'
            condition: always()
            continueOnError: true

          # ── Generate Allure report ─────────────────────────────────────────────
          - script: |
              npm install -g allure-commandline --save-dev
              allure generate allure-results --clean -o allure-report
            displayName: 'Generate Allure HTML report'
            condition: always()
            continueOnError: true

          # ── Publish Allure report artifact ─────────────────────────────────────
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Allure report'
            inputs:
              targetPath: 'allure-report'
              artifact: 'AllureReport-$(Build.BuildNumber)'
              publishLocation: 'pipeline'
            condition: always()

          # ── Publish Playwright HTML report artifact ────────────────────────────
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Playwright HTML report'
            inputs:
              targetPath: 'reports/html'
              artifact: 'PlaywrightHTMLReport-$(Build.BuildNumber)'
              publishLocation: 'pipeline'
            condition: always()

          # ── Publish screenshots on failure ─────────────────────────────────────
          - task: PublishPipelineArtifact@1
            displayName: 'Publish failure screenshots'
            inputs:
              targetPath: 'reports/screenshots'
              artifact: 'FailureScreenshots-$(Build.BuildNumber)'
              publishLocation: 'pipeline'
            condition: failed()

          # ── Publish test logs ──────────────────────────────────────────────────
          - task: PublishPipelineArtifact@1
            displayName: 'Publish test logs'
            inputs:
              targetPath: 'reports/logs'
              artifact: 'TestLogs-$(Build.BuildNumber)'
              publishLocation: 'pipeline'
            condition: always()
